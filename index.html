<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <title>Budget Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Personal finance</p>
        <h1>Budget Tracker</h1>
      </div>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">☾</button>
    </header>

    <main>
      <section class="hero-card glass">
        <div class="hero-head">
          <span id="monthLabel">This month</span>
          <select id="monthFilter" aria-label="Month filter"></select>
        </div>
        <div class="balance-block">
          <p>Available balance</p>
          <h2 id="balanceAmount">₹0</h2>
        </div>
        <div class="summary-grid">
          <div class="summary-pill income">
            <span>Income</span>
            <strong id="incomeAmount">₹0</strong>
          </div>
          <div class="summary-pill expense">
            <span>Expense</span>
            <strong id="expenseAmount">₹0</strong>
          </div>
        </div>
      </section>

      <section class="quick-card">
        <div class="section-title">
          <h2>Add transaction</h2>
          <span id="editHint">New entry</span>
        </div>

        <form id="transactionForm" class="transaction-form">
          <div class="segmented" role="tablist" aria-label="Transaction type">
            <input type="radio" id="expense" name="type" value="expense" checked />
            <label for="expense">Expense</label>
            <input type="radio" id="income" name="type" value="income" />
            <label for="income">Income</label>
          </div>

          <label class="field">
            <span>Amount</span>
            <input id="amount" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" required />
          </label>

          <div class="row-fields">
            <label class="field">
              <span>Category</span>
              <select id="category" required></select>
            </label>
            <label class="field">
              <span>Date</span>
              <input id="date" type="date" required />
            </label>
          </div>

          <label class="field">
            <span>Note</span>
            <input id="note" type="text" maxlength="80" placeholder="e.g. Zomato, Salary, Rent" />
          </label>

          <div class="form-actions">
            <button type="button" class="secondary-btn" id="cancelEdit" hidden>Cancel</button>
            <button type="submit" class="primary-btn" id="submitBtn">Add transaction</button>
          </div>
        </form>
      </section>

      <section class="insights-card">
        <div class="section-title">
          <h2>Category spend</h2>
          <span id="topCategory">No expenses yet</span>
        </div>
        <div id="categoryBars" class="category-bars"></div>
      </section>

      <section class="transactions-card">
        <div class="section-title">
          <h2>Transactions</h2>
          <button class="text-btn" id="clearMonth">Clear month</button>
        </div>
        <div id="transactionList" class="transaction-list"></div>
      </section>

      <section class="backup-card">
        <div>
          <h2>Backup</h2>
          <p>Your data is stored only on this device. Export a backup before clearing Safari data or changing phones.</p>
        </div>
        <div class="backup-actions">
          <button class="secondary-btn" id="exportBtn">Export JSON</button>
          <label class="secondary-btn file-label">
            Import JSON
            <input id="importFile" type="file" accept="application/json" hidden />
          </label>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
